<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>

    <!-- Cinzel Decorative — найкращий аналог GoT з повною кирилицею uppercase -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
            color: white;
            transition: background-color 1.5s ease;
        }

        body.night {
            background-color: #0a0a1f;
        }

        .bg-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: opacity 1.8s ease;
        }

        .bg-day {
            opacity: 1;
        }

        body.night .bg-day {
            opacity: 0;
        }

        body.night .bg-night {
            opacity: 1;
        }

        .bg-night {
            opacity: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 20px 0;
            transition: color 1.5s ease, text-shadow 1.5s ease;
        }

        body.night .container {
            color: #e0e0ff;
        }

        .header {
            font-family: 'Cinzel Decorative', Georgia, serif;
            color: #d4af37;
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            font-weight: 900;
            text-shadow: 3px 3px 10px black;
            margin-top: 3vh;
            text-transform: uppercase; /* усі літери великі, однакові */
            letter-spacing: 2px;
        }

        .oath {
            font-family: 'Optimus', 'Georgia', serif;
            color: #e0e0e0;
            font-size: clamp(1.8rem, 5.5vw, 4rem);
            line-height: 1.25;
            text-shadow: 2px 2px 12px black;
        }

        .bottom-block {
            margin-bottom: 4vh;
            width: 100%;
        }

        .label {
            font-size: clamp(1.4rem, 4vw, 2.8rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .timer {
            font-size: clamp(5rem, 16vw, 11rem);
            color: #a5f2f3;
            text-shadow: 0 0 40px rgba(165, 242, 243, 0.6);
            line-height: 0.9;
        }

        body.night .timer {
            color: #80d4ff;
            text-shadow: 0 0 50px rgba(128, 212, 255, 0.8);
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <!-- Денні фони -->
        <picture class="bg bg-day">
          <source media="(min-width: 901px)" srcset="backg.png">
          <img src="back.png" alt="" loading="eager">
        </picture>

        <!-- Нічні фони -->
        <picture class="bg bg-night">
          <source media="(min-width: 901px)" srcset="backnight.png">
          <img src="backgnight.png" alt="" loading="eager">
        </picture>
    </div>

    <div class="container">
        <div class="header">ніч починається, і починається моя варта...</div>
        <div class="oath">
            Я — меч у темряві.<br>
            Я — вартовий на Стіні.
        </div>
        <div class="bottom-block">
            <div class="label">до кінця варти</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <audio id="ambience" loop muted volume="0.35">
        <source src="wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="theme" loop muted volume="0.20">
        <source src="title.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Таймер
        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(8, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText =
                (h < 10 ? "0" + h : h) + ":" +
                (m < 10 ? "0" + m : m) + ":" +
                (s < 10 ? "0" + s : s);
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // Аудіо
        const ambience = document.getElementById('ambience');
        const theme = document.getElementById('theme');
        let unlocked = false;
        function unlockAudio() {
            if (unlocked) return;
            unlocked = true;
            ambience.muted = false;
            theme.muted = false;
            ambience.play().catch(() => {});
            theme.play().catch(() => {});
        }

        // Перемикання теми день/ніч
        const body = document.body;
        let isNight = localStorage.getItem('nightMode') === 'true';

        if (isNight) {
            body.classList.add('night');
        }

        function toggleTheme() {
            isNight = !isNight;
            body.classList.toggle('night', isNight);
            localStorage.setItem('nightMode', isNight);
        }

        // Клік — перемикання теми + розблокування звуку
        document.addEventListener('click', function(e) {
            unlockAudio();
            toggleTheme();
        }, { passive: true });

        document.addEventListener('touchstart', function(e) {
            unlockAudio();
            toggleTheme();
        }, { once: false, passive: true });
    </script>
</body>
</html>
