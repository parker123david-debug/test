<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Cinzel', Georgia, serif;
            color: white;
            background: #000; /* на випадок проблем з фоном */
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .container {
            position: relative;
            z-index: 3;           /* текст над усім */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 20px 0;
        }

        .header {
            color: #d4af37;
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            font-weight: 900;
            text-shadow: 3px 3px 10px black;
            margin-top: 3vh;
        }

        .oath {
            color: #e0e0e0;
            font-size: clamp(1.8rem, 5.5vw, 4rem);
            line-height: 1.25;
            text-shadow: 2px 2px 12px black;
        }

        .bottom-block {
            margin-bottom: 4vh;
            width: 100%;
        }

        .label {
            font-size: clamp(1.4rem, 4vw, 2.8rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .timer {
            font-size: clamp(5rem, 16vw, 11rem);
            color: #a5f2f3;
            text-shadow: 0 0 40px rgba(165, 242, 243, 0.6);
            line-height: 0.9;
        }

        /* Сніг */
        .snow-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;               /* між фоном і текстом */
            overflow: visible;        /* важливо! щоб сніг не обрізався зверху */
        }

        .snowflake {
            position: absolute;
            top: -20px;               /* починаємо трохи вище екрану */
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255,255,255,0.95);
            opacity: 0.92;
            animation: fall linear infinite;
            will-change: transform;   /* оптимізація анімації */
        }

        /* Більше різноманітності */
        .snowflake:nth-child(odd)  { animation-duration: 18s; }
        .snowflake:nth-child(even) { animation-duration: 24s; }

        .snowflake:nth-child(3n)   { animation-duration: 15s; width: 4px; height: 4px; opacity: 0.7; }
        .snowflake:nth-child(5n)   { animation-duration: 20s; width: 8px; height: 8px; opacity: 0.95; }
        .snowflake:nth-child(7n)   { animation-duration: 22s; width: 6px; height: 6px; opacity: 0.85; }

        /* Позиції */
        .snowflake:nth-child(1)  { left: 8%;  animation-delay: -2s; }
        .snowflake:nth-child(2)  { left: 14%; animation-delay: -5s; }
        .snowflake:nth-child(3)  { left: 22%; animation-delay: -8s; }
        .snowflake:nth-child(4)  { left: 29%; animation-delay: -1s; }
        .snowflake:nth-child(5)  { left: 35%; animation-delay: -4s; width: 7px; height: 7px; }
        .snowflake:nth-child(6)  { left: 41%; animation-delay: -7s; }
        .snowflake:nth-child(7)  { left: 48%; animation-delay: -10s; width: 5px; height: 5px; }
        .snowflake:nth-child(8)  { left: 54%; animation-delay: -3s; }
        .snowflake:nth-child(9)  { left: 61%; animation-delay: -6s; width: 9px; height: 9px; }
        .snowflake:nth-child(10) { left: 67%; animation-delay: -9s; }
        .snowflake:nth-child(11) { left: 74%; animation-delay: -12s; }
        .snowflake:nth-child(12) { left: 81%; animation-delay: -0.5s; width: 6px; height: 6px; }
        .snowflake:nth-child(13) { left: 87%; animation-delay: -2.5s; }
        .snowflake:nth-child(14) { left: 93%; animation-delay: -5.5s; }
        .snowflake:nth-child(15) { left: 4%;  animation-delay: -7.5s; width: 8px; height: 8px; }
        .snowflake:nth-child(16) { left: 11%; animation-delay: -10.5s; }
        .snowflake:nth-child(17) { left: 19%; animation-delay: -13s; }
        .snowflake:nth-child(18) { left: 26%; animation-delay: -1.5s; width: 5px; height: 5px; }
        .snowflake:nth-child(19) { left: 33%; animation-delay: -4.5s; }
        .snowflake:nth-child(20) { left: 40%; animation-delay: -7.5s; }
        .snowflake:nth-child(21) { left: 47%; animation-delay: -10.5s; width: 7px; height: 7px; }
        .snowflake:nth-child(22) { left: 53%; animation-delay: -13.5s; }
        .snowflake:nth-child(23) { left: 60%; animation-delay: -16s; }
        .snowflake:nth-child(24) { left: 68%; animation-delay: -2s; width: 6px; height: 6px; }
        .snowflake:nth-child(25) { left: 76%; animation-delay: -5s; }

        @keyframes fall {
            0%   { transform: translateY(-20vh) translateX(0) rotate(0deg); }
            100% { transform: translateY(120vh) translateX(var(--sway, 30px)) rotate(1080deg); }
        }

        /* Додаємо випадкове хитання через CSS змінну */
        .snowflake:nth-child(odd)  { --sway: 40px; }
        .snowflake:nth-child(even) { --sway: -35px; }
        .snowflake:nth-child(3n)   { --sway: 25px; }
        .snowflake:nth-child(4n)   { --sway: -45px; }
    </style>
</head>
<body>

    <picture>
      <source media="(min-width: 901px)" srcset="backg.png">
      <img class="bg" src="back.png" alt="" loading="eager">
    </picture>

    <!-- Сніг – 25 сніжинок -->
    <div class="snow-container">
      <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
      <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
      <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
      <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
      <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
      <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
      <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
      <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
      <div class="snowflake"></div>
    </div>

    <div class="container">
        <div class="header">НІЧ ПОЧИНАЄТЬСЯ, І ПОЧИНАЄТЬСЯ МОЯ ВАРТА...</div>
        <div class="oath">
            Я — меч у темряві.<br>
            Я — вартовий на Стіні.
        </div>
        <div class="bottom-block">
            <div class="label">ДО КІНЦЯ ВАРТИ</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <audio id="ambience" loop muted volume="0.35">
        <source src="wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="theme" loop muted volume="0.20">
        <source src="title.mp3" type="audio/mpeg">
    </audio>

    <script>
        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(8, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText =
                (h < 10 ? "0" + h : h) + ":" +
                (m < 10 ? "0" + m : m) + ":" +
                (s < 10 ? "0" + s : s);
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        const ambience = document.getElementById('ambience');
        const theme = document.getElementById('theme');
        let unlocked = false;
        function unlockAudio() {
            if (unlocked) return;
            unlocked = true;
            ambience.muted = false;
            theme.muted = false;
            ambience.play().catch(() => {});
            theme.play().catch(() => {});
        }
        document.addEventListener('click', unlockAudio, { once: true });
        document.addEventListener('touchstart', unlockAudio, { once: true });
    </script>
</body>
</html>
